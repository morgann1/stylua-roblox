name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.3.0)"
        required: false
        default: ""

jobs:
  build-plugin:
    runs-on: ubuntu-latest
    name: Build Roblox Studio Plugin
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: CompeyDev/setup-rokit@v0.1.2

      - name: Run selene
        run: selene src
        working-directory: plugin

      - name: Run stylua
        run: stylua -c src
        working-directory: plugin

      - name: Generate sourcemap
        run: rojo sourcemap default.project.json --output sourcemap.json
        working-directory: plugin

      - name: Download global Roblox types
        shell: bash
        run: curl -s -O https://raw.githubusercontent.com/JohnnyMorganz/luau-lsp/master/scripts/globalTypes.d.luau

      - name: Run Luau Analyze
        run: luau-lsp analyze --sourcemap=sourcemap.json --defs=../globalTypes.d.luau --no-strict-dm-types src
        working-directory: plugin

      - name: Build Plugin
        run: rojo build plugin -o StyluaRobloxPlugin.rbxm

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: StyluaRobloxPlugin.rbxm
          path: StyluaRobloxPlugin.rbxm

  build-exe:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build Binary
        run: node build.js

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StyLua-Roblox.exe
          path: StyLua-Roblox.exe

  release:
    runs-on: ubuntu-latest
    needs: [build-plugin, build-exe]
    permissions:
      contents: write
    steps:
      - name: Determine tag name
        id: tag_name
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          TAG="${TAG#refs/tags/}"
          # Ensure tag has v prefix
          TAG="${TAG#v}"
          TAG="v$TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_name.outputs.tag }}
          name: ${{ steps.tag_name.outputs.tag }}
          draft: true
          files: |
            StyluaRobloxPlugin.rbxm/StyluaRobloxPlugin.rbxm
            StyLua-Roblox.exe/StyLua-Roblox.exe
